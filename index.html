<!DOCTYPE html
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CropCare POS - Multi-Device</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f1f5f9; font-family: system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); align-items: center; justify-content: center; z-index: 100; padding: 15px; backdrop-blur: 4px; }
        
        /* Grid Layout */
        .product-grid { display: grid; gap: 1.25rem; grid-template-columns: repeat(1, minmax(0, 1fr)); }
        @media (min-width: 768px) { .product-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
        @media (min-width: 1280px) { .product-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); } }

        /* Professional Payment Buttons */
        .pay-btn { 
            border: 2px solid #e2e8f0; 
            border-radius: 16px; 
            padding: 16px 8px; 
            cursor: pointer; 
            text-align: center; 
            font-size: 12px; 
            font-weight: 800; 
            background: white; 
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        .pay-btn:hover { border-color: #94a3b8; background: #f8fafc; transform: translateY(-2px); }
        .pay-btn.active { border-color: #166534; background: #f0fdf4; color: #166534; box-shadow: 0 4px 12px rgba(22, 101, 52, 0.15); }

        .qty-box { 
            width: 85px; height: 55px; border: 2px solid #cbd5e1; border-radius: 12px; 
            text-align: center; font-weight: 900; font-size: 20px; outline: none; transition: 0.2s;
        }
        .qty-box:focus { border-color: #166534; box-shadow: 0 0 0 4px rgba(22, 101, 52, 0.1); background: white; }

        .checkout-card { background: white; width: 100%; max-width: 500px; border-radius: 32px; padding: 2rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
    </style>
</head>
<body class="pb-44">
    <div class="max-w-7xl mx-auto px-6">
        <header class="bg-green-900 text-white p-10 rounded-b-[3.5rem] shadow-2xl mb-10 flex flex-col lg:flex-row lg:items-center justify-between gap-8">
            <div>
                <h1 class="text-4xl font-black uppercase tracking-tighter italic">CropCare <span class="text-green-400">Pro</span></h1>
                <p class="text-sm font-bold text-green-300 opacity-70 uppercase tracking-[0.2em] mt-2">Enterprise POS Terminal</p>
            </div>
            <div class="relative w-full lg:w-[450px]">
                <input type="text" id="srch" onkeyup="render()" placeholder="🔍 Type to find a product..." class="w-full p-5 rounded-2xl text-black text-lg outline-none shadow-2xl border-none focus:ring-4 focus:ring-green-500/40 transition-all">
            </div>
        </header>

        <div id="list" class="product-grid"></div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-xl p-8 shadow-[0_-15px_50px_rgba(0,0,0,0.15)] border-t border-gray-100 flex justify-center z-50">
        <div class="max-w-7xl w-full flex flex-row justify-between items-center gap-4">
            <div class="hidden sm:flex flex-col">
                <span class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Current Order</span>
                <span id="countDisp" class="text-sm font-bold text-slate-600">0 Bags Selected</span>
            </div>
            <div class="flex items-center gap-8">
                <div class="text-right">
                    <span class="text-[10px] font-black text-gray-400 uppercase tracking-widest block mb-1">Total Amount</span>
                    <span id="totalDisp" class="text-4xl font-black text-slate-900 leading-none tracking-tighter">KES 0</span>
                </div>
                <button onclick="openM()" class="bg-green-800 hover:bg-green-900 text-white px-14 py-6 rounded-2xl font-black uppercase shadow-2xl active:scale-95 transition-all text-base tracking-wider flex items-center gap-3">
                    Checkout Now ➔
                </button>
            </div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="checkout-card overflow-y-auto max-h-[95vh]">
            <div class="flex justify-between items-center mb-8">
                <h2 class="font-black text-2xl uppercase text-slate-800 tracking-tight">Checkout</h2>
                <button onclick="closeM()" class="text-gray-400 hover:text-red-500 font-bold text-2xl">&times;</button>
            </div>
            
            <div class="space-y-6">
                <div>
                    <label class="text-[11px] font-black text-gray-400 uppercase mb-2 block tracking-widest">Customer Name</label>
                    <input id="cName" type="text" placeholder="Who is buying?" class="w-full bg-gray-50 border border-gray-200 p-4 rounded-xl mb-4 outline-none focus:border-green-600 focus:bg-white transition-all font-bold">
                </div>

                <div id="rItems" class="bg-slate-50 rounded-2xl p-5 mb-4 text-sm font-bold space-y-3 text-slate-700 max-h-40 overflow-y-auto border border-dashed border-slate-200"></div>
                
                <div>
                    <label class="text-[11px] font-black text-gray-400 uppercase mb-3 block tracking-widest">Select Payment Method</label>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                        <div class="pay-btn active" onclick="setP(this,'M-PESA')"><span>📱</span>M-PESA</div>
                        <div class="pay-btn" onclick="setP(this,'CASH')"><span>💵</span>CASH</div>
                        <div class="pay-btn" onclick="setP(this,'VOOMA')"><span>🏦</span>VOOMA</div>
                        <div class="pay-btn" onclick="setP(this,'CARD')"><span>💳</span>CARD</div>
                    </div>
                </div>

                <div>
                    <label class="text-[11px] font-black text-gray-400 uppercase mb-2 block tracking-widest">Apply Discount</label>
                    <input id="disc" type="number" onkeyup="updM()" placeholder="0.00" class="w-full border border-gray-200 p-4 rounded-xl outline-none focus:border-green-600 font-black
